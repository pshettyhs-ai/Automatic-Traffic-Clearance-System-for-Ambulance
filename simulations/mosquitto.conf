# mosquitto.conf — local development / single-server pilot configuration.
#
# SECURITY NOTE: this config allows anonymous connections for ease of local
# setup. Before exposing the broker beyond your own LAN, set
# `allow_anonymous false`, configure a password file
# (`mosquitto_passwd -c passwd <user>`), and enable TLS (`certfile`/`keyfile`)
# — see docs/Deployment_Guide.md for the production checklist.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
