<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- road -->
  <rect x="0" y="230" width="1200" height="50" fill="url(#roadGrad)"/>
  <g stroke="#fbbf24" stroke-width="4" stroke-dasharray="22,18" opacity="0.8">
    <line x1="0" y1="255" x2="1200" y2="255"/>
  </g>

  <!-- distant city skyline silhouette -->
  <g fill="#1e293b" opacity="0.6">
    <rect x="40" y="160" width="26" height="70"/>
    <rect x="74" y="140" width="20" height="90"/>
    <rect x="100" y="175" width="30" height="55"/>
    <rect x="1060" y="150" width="24" height="80"/>
    <rect x="1090" y="170" width="18" height="60"/>
    <rect x="1115" y="130" width="28" height="100"/>
  </g>

  <!-- traffic light pole, left -->
  <g transform="translate(150,60)">
    <rect x="18" y="40" width="6" height="140" fill="#475569"/>
    <rect x="0" y="0" width="42" height="100" rx="8" fill="#0b1120" stroke="#475569" stroke-width="2"/>
    <circle cx="21" cy="22" r="11" fill="#7f1d1d"/>
    <circle cx="21" cy="50" r="11" fill="#78350f"/>
    <circle cx="21" cy="78" r="11" fill="#16a34a" filter="url(#glowGreen)"/>
  </g>

  <!-- traffic light pole, right (red, for the ambulance's cross lane) -->
  <g transform="translate(990,60)">
    <rect x="18" y="40" width="6" height="140" fill="#475569"/>
    <rect x="0" y="0" width="42" height="100" rx="8" fill="#0b1120" stroke="#475569" stroke-width="2"/>
    <circle cx="21" cy="22" r="11" fill="#dc2626" filter="url(#glowRed)"/>
    <circle cx="21" cy="50" r="11" fill="#78350f"/>
    <circle cx="21" cy="78" r="11" fill="#14532d"/>
  </g>

  <!-- ambulance, simple flat icon, driving along the road -->
  <g transform="translate(195,243)">
    <rect x="0" y="-26" width="80" height="30" rx="4" fill="#f8fafc"/>
    <rect x="0" y="-41" width="40" height="17" rx="3" fill="#f8fafc"/>
    <rect x="4" y="-37" width="14" height="10" fill="#7dd3fc" opacity="0.85"/>
    <rect x="36" y="-19" width="18" height="12" fill="#dc2626"/>
    <rect x="41" y="-24" width="7" height="22" fill="#dc2626"/>
    <circle cx="16" cy="6" r="8" fill="#0f172a"/>
    <circle cx="64" cy="6" r="8" fill="#0f172a"/>
    <rect x="1" y="-45" width="9" height="5" fill="#ef4444" filter="url(#glowRed)"/>
  </g>

  <!-- title -->
  <text x="600" y="95" text-anchor="middle" font-size="40" font-weight="800" fill="#f8fafc">
    Traffic Clearance System
  </text>
  <text x="600" y="135" text-anchor="middle" font-size="40" font-weight="800" fill="#f8fafc">
    for Emergency Vehicles
  </text>
  <text x="600" y="166" text-anchor="middle" font-size="16" fill="#94a3b8">
    Edge-AI ambulance detection &#8226; real-time embedded signal control &#8226; live IoT dashboard
  </text>
</svg>
