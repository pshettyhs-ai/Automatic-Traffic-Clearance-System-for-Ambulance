<svg viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="590" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Corrected Block Diagram — Traffic Controlling &amp; Emergency Ambulance Detection</text>
  <text x="590" y="56" text-anchor="middle" font-size="12.5" fill="#64748b">v2 — fixes: camera moved off the Pico relay circuit, single shared PSU, MQTT added, directionally consistent signal flow</text>

  <!-- Camera -->
  <rect x="40" y="100" width="180" height="70" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="130" y="128" text-anchor="middle" font-size="13" font-weight="600">PI Camera Module</text>
  <text x="130" y="146" text-anchor="middle" font-size="10.5" fill="#475569">CSI · mounted at intersection</text>

  <!-- Pi4 -->
  <rect x="270" y="90" width="210" height="90" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="375" y="116" text-anchor="middle" font-size="13.5" font-weight="700">Raspberry Pi 4B</text>
  <text x="375" y="133" text-anchor="middle" font-size="11" fill="#1d4ed8">OpenCV + YOLOv8 Inference</text>
  <text x="375" y="151" text-anchor="middle" font-size="10.5" fill="#475569">Ambulance detect → confidence ≥0.85</text>
  <text x="375" y="167" text-anchor="middle" font-size="10.5" fill="#475569">publishes MQTT event + REST heartbeat</text>

  <!-- MQTT Broker -->
  <rect x="540" y="90" width="170" height="90" rx="8" fill="#fef9ec" stroke="#d97706" stroke-width="2"/>
  <text x="625" y="118" text-anchor="middle" font-size="13.5" font-weight="700">MQTT Broker</text>
  <text x="625" y="136" text-anchor="middle" font-size="10.5" fill="#92400e">topic: traffic/emergency</text>
  <text x="625" y="152" text-anchor="middle" font-size="10.5" fill="#92400e">topic: traffic/lane/status</text>
  <text x="625" y="168" text-anchor="middle" font-size="10.5" fill="#92400e">topic: traffic/health</text>

  <!-- Web dashboard -->
  <rect x="770" y="90" width="200" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="870" y="118" text-anchor="middle" font-size="13.5" font-weight="700">Web Dashboard</text>
  <text x="870" y="136" text-anchor="middle" font-size="10.5" fill="#166534">React + WebSocket live feed</text>
  <text x="870" y="152" text-anchor="middle" font-size="10.5" fill="#166534">analytics &amp; manual override</text>
  <text x="870" y="168" text-anchor="middle" font-size="10.5" fill="#166534">via REST API</text>

  <!-- Backend -->
  <rect x="1010" y="90" width="135" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1077" y="118" text-anchor="middle" font-size="12.5" font-weight="700">Node.js</text>
  <text x="1077" y="134" text-anchor="middle" font-size="12.5" font-weight="700">Backend + DB</text>
  <text x="1077" y="154" text-anchor="middle" font-size="10" fill="#166534">REST · WS</text>
  <text x="1077" y="168" text-anchor="middle" font-size="10" fill="#166534">SQLite log</text>

  <!-- Pico WH -->
  <rect x="270" y="280" width="210" height="110" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="375" y="306" text-anchor="middle" font-size="13.5" font-weight="700">Raspberry Pi Pico WH</text>
  <text x="375" y="324" text-anchor="middle" font-size="11" fill="#1d4ed8">Real-Time Signal Controller</text>
  <text x="375" y="342" text-anchor="middle" font-size="10.5" fill="#475569">MQTT subscribe → override FSM</text>
  <text x="375" y="358" text-anchor="middle" font-size="10.5" fill="#475569">drives relay + OLED mux + IR read</text>
  <text x="375" y="374" text-anchor="middle" font-size="10.5" fill="#475569">independent fallback timer logic</text>

  <!-- Relay module -->
  <rect x="40" y="290" width="170" height="90" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="125" y="318" text-anchor="middle" font-size="13" font-weight="600">4-Ch Relay Module</text>
  <text x="125" y="336" text-anchor="middle" font-size="10.5" fill="#7c2d12">switches 12V LED arrays</text>
  <text x="125" y="352" text-anchor="middle" font-size="10.5" fill="#7c2d12">opto-isolated from GPIO</text>

  <!-- RGB LED signals -->
  <rect x="40" y="430" width="170" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="125" y="458" text-anchor="middle" font-size="13" font-weight="600">RGB LED Traffic</text>
  <text x="125" y="474" text-anchor="middle" font-size="13" font-weight="600">Signals ×4 lanes</text>
  <circle cx="115" cy="495" r="6" fill="#dc2626"/><circle cx="135" cy="495" r="6" fill="#16a34a"/>

  <!-- OLED mux -->
  <rect x="270" y="440" width="210" height="100" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="375" y="466" text-anchor="middle" font-size="13" font-weight="600">PCA9548A I2C Mux</text>
  <text x="375" y="484" text-anchor="middle" font-size="10.5" fill="#5b21b6">addr 0x70 · channels 0-3</text>
  <text x="375" y="500" text-anchor="middle" font-size="10.5" fill="#5b21b6">4× SSD1306 OLED (0x3C)</text>
  <text x="375" y="516" text-anchor="middle" font-size="10.5" fill="#5b21b6">128×64 — lane status/timer</text>

  <!-- IR sensors -->
  <rect x="540" y="280" width="170" height="80" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="625" y="308" text-anchor="middle" font-size="13" font-weight="600">IR Occupancy</text>
  <text x="625" y="324" text-anchor="middle" font-size="13" font-weight="600">Sensors ×4</text>
  <text x="625" y="346" text-anchor="middle" font-size="10.5" fill="#0e7490">lane green-time extension</text>

  <!-- ESP8266 buzzer node -->
  <rect x="540" y="380" width="170" height="90" rx="8" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="625" y="406" text-anchor="middle" font-size="13" font-weight="600">ESP8266 Node</text>
  <text x="625" y="424" text-anchor="middle" font-size="10.5" fill="#854d0e">MQTT subscriber</text>
  <text x="625" y="440" text-anchor="middle" font-size="10.5" fill="#854d0e">drives buzzer on</text>
  <text x="625" y="456" text-anchor="middle" font-size="10.5" fill="#854d0e">emergency alert</text>

  <!-- Power supply -->
  <rect x="800" y="290" width="345" height="100" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="972" y="318" text-anchor="middle" font-size="13.5" font-weight="700">Shared 5V/12V Regulated PSU + UPS</text>
  <text x="972" y="338" text-anchor="middle" font-size="10.5" fill="#475569">12V/5A → LED arrays via relay  ·  5V/3A → Pi4, Pico WH, ESP8266, OLEDs</text>
  <text x="972" y="356" text-anchor="middle" font-size="10.5" fill="#475569">7Ah SLA battery backup, &lt;10ms switchover, 2hr runtime</text>
  <text x="972" y="374" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">(single source — original report's duplicated PSU blocks removed)</text>

  <!-- Bottom note box -->
  <rect x="40" y="610" width="1105" height="115" rx="10" fill="#fafafa" stroke="#cbd5e1"/>
  <text x="60" y="635" font-size="13" font-weight="700" fill="#0f172a">Corrections applied vs. original Fig 2.1:</text>
  <text x="60" y="657" font-size="11.5" fill="#334155">1. Camera now connects to the Pi 4B (CSI), not directly into the Pico/relay circuit — a Pico cannot run YOLOv8 inference or accept a CSI feed.</text>
  <text x="60" y="675" font-size="11.5" fill="#334155">2. The two disconnected "Regulated Power Supply" boxes and the backward OLED→PSU arrow in the original are replaced by one shared, correctly-directed PSU.</text>
  <text x="60" y="693" font-size="11.5" fill="#334155">3. REST-only signalling is replaced by MQTT for time-critical emergency events; REST is kept for configuration/manual control and WebSocket for the live dashboard.</text>
  <text x="60" y="711" font-size="11.5" fill="#334155">4. The ESP8266, previously redundant with the Pico WH's built-in Wi-Fi, is repurposed as a dedicated acoustic-alert node instead of being removed.</text>

  <!-- Arrows -->
  <line x1="220" y1="135" x2="268" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="480" y1="135" x2="538" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="710" y1="135" x2="768" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#a2)" stroke-dasharray="4,3"/>
  <line x1="970" y1="135" x2="1008" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="625" y1="180" x2="450" y2="278" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <text x="560" y="225" font-size="10.5" fill="#64748b" transform="rotate(-32 560 225)">MQTT (emergency override)</text>

  <line x1="270" y1="335" x2="210" y2="335" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="125" y1="380" x2="125" y2="428" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="375" y1="390" x2="375" y2="438" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="540" y1="320" x2="480" y2="320" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="625" y1="360" x2="625" y2="378" stroke="#334155" stroke-width="2" marker-end="url(#a2)"/>

  <line x1="800" y1="335" x2="480" y2="335" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="800" y1="345" x2="125" y2="430" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="800" y1="320" x2="375" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>
